<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esau Villamor | Civil Engineer</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f8fafc;
  color: #1e293b;
}

/* HERO SECTION */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

/* Background Image */
.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://images.unsplash.com/photo-1581091215367-59ab6b2b1b77') no-repeat center/cover;
  opacity: 0.12;
  z-index: 0;
}

/* Content */
.hero-content {
  position: relative;
  z-index: 1;
}

/* Profile Image */
.profile-pic {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #38bdf8;
  margin-bottom: 20px;
}

/* Name */
.hero h1 {
  font-size: 2.5rem;
  margin: 10px 0;
}

/* Subtitle */
.hero p {
  font-size: 1.1rem;
  opacity: 0.7;
}

/* Button */
.btn {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 20px;
  background: #38bdf8;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #0ea5e9;
}
</style>

</head>
<body>

<section class="hero">
  <div class="hero-content">
    
    <!-- 🔴 REPLACE THIS IMAGE LINK WITH YOUR OWN -->
    <img src="Esau.jpg" class="profile-pic">

    <h1>Esau Anthony E. Villamor, RCE</h1>
    <p>Civil Engineer | Virtual Assistant</p>

    <a href="#about" class="btn">View My Work</a>

  </div>
</section>

</body>
</html>
